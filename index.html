<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Portfolio fullstack developerki. Aplikacje rozproszone, React, TypeScript i premium developer experience."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <script>
      ;(function () {
        try {
          var key = 'portfolio-theme-preference'
          var stored = localStorage.getItem(key)
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          var meta = document.querySelector('meta[name="theme-color"]')
          if (theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light')
            document.documentElement.style.colorScheme = 'light'
            meta && meta.setAttribute('content', '#eceff4')
          } else {
            document.documentElement.style.colorScheme = 'dark'
            meta && meta.setAttribute('content', '#0f172a')
          }
        } catch (e) {}
      })()
    </script>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rose van der Ende | Fullstack Developer Portfolio" />
    <meta
      property="og:description"
      content="Portfolio fullstack developerki. Aplikacje rozproszone, React, TypeScript i premium developer experience."
    />
    <meta property="og:locale" content="pl_PL" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Rose van der Ende | Fullstack Developer Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
